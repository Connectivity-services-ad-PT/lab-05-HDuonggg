name: CI - Compose & Newman

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  compose-test:
    runs-on: ubuntu-latest
    services: {}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Debug runner + Docker versions
        run: |
          uname -a || true
          docker --version || true
          docker buildx version || true

      - name: Install Docker Compose plugin (apt or fallback download)
        run: |
          set -e
          sudo apt-get update || true
          if sudo apt-get install -y docker-compose-plugin; then
            docker compose version
          else
            echo "apt install failed — falling back to downloading docker-compose binary"
            sudo mkdir -p /usr/local/lib/docker/cli-plugins
            sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64" -o /usr/local/lib/docker/cli-plugins/docker-compose
            sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
            docker compose version
          fi

      - name: Build and start compose stack
        run: |
          # ensure .env exists to avoid "env file ... .env not found" errors on runner
          if [ ! -f .env ]; then
            echo "# generated by CI" > .env
          fi
          # ensure external network used by compose exists on runner
          if ! docker network inspect class-net >/dev/null 2>&1; then
            docker network create class-net || true
          fi
          docker compose up -d --build
          sleep 10

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run Newman tests
        run: |
          npm ci
          npx -y newman@latest run postman/collections/FIT4110_lab05_iot_compose.postman_collection.json --environment postman/environments/FIT4110_lab05_local.postman_environment.json --reporters cli,json --reporter-json-export reports/newman-ci.json

      - name: Tear down Compose
        if: always()
        run: |
          # ignore errors during teardown to avoid failing the job when compose artifacts are missing
          docker compose down -v || true
